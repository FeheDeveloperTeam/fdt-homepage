<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="FeheDeveloperTeam, FDT, 디스코드 봇 개발, 디스코드 봇 제작, 웹 개발, 프리랜서 개발팀" />

    <!--
      description / robots / canonical / og:title / og:description / og:url / twitter:title / twitter:description
      는 페이지별로 src/components/Seo/Seo.jsx (react-helmet-async)가 채운다.
      react-helmet-async는 정적 태그를 대체하지 않고 추가만 하므로 여기서는 선언하지 않는다.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FeheDeveloperTeam" />
    <meta property="og:image" content="https://www.fehe.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FeheDeveloperTeam(FDT) 로고" />
    <meta property="og:locale" content="ko_KR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.fehe.dev/og-image.png" />

    <title>FeheDeveloperTeam | FDT</title>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "FeheDeveloperTeam",
        "alternateName": "FDT",
        "url": "https://www.fehe.dev/",
        "logo": "https://www.fehe.dev/favicon.png",
        "description": "디스코드 봇 개발과 웹 개발을 중심으로 하는 프리랜서 개발팀",
        "email": "help@fehe.dev"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
